name: Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]

# Least privilege by default: the build/test job only needs read access. The
# release job below opts into `contents: write` and only runs on tag pushes,
# so PR code (which runs in `build`) never has a write-scoped token.
permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: windows-2022

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # PR code runs here; don't leave a usable git credential around for it.
          persist-credentials: false

      - name: Install Rust
        # Pinned to the toolchain in rust-toolchain.toml for reproducible builds.
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Tests
        run: cargo test --verbose

      - name: Build Release Binary
        run: cargo build --release --verbose

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zapret-ui
          path: target/release/zapret-ui.exe

  release:
    name: Publish Release
    needs: build
    runs-on: windows-2022
    # Only tag pushes publish; this is the only job granted write access.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build Release Binary
        run: cargo build --release --verbose

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/zapret-ui.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
