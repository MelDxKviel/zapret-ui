name: CI / Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]

# Least privilege by default: checks only need read access. The release job
# below opts into `contents: write` and only runs on tag pushes, so PR code
# (which runs in `checks`) never has a write-scoped token.
permissions:
  contents: read

# Cancel superseded runs on the same ref (but never cancel a tag release).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  checks:
    name: Lint & Test
    runs-on: windows-2022

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # PR code runs here; don't leave a usable git credential around for it.
          persist-credentials: false
          # Full history so build.rs `git describe` resolves a meaningful version.
          fetch-depth: 0

      - name: Read pinned toolchain
        id: toolchain
        shell: pwsh
        run: |
          $channel = ([regex]'channel\s*=\s*"([^"]+)"').Match((Get-Content rust-toolchain.toml -Raw)).Groups[1].Value
          "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Pinned toolchain: $channel"

      - name: Install Rust
        # Install the exact toolchain named in rust-toolchain.toml (single source
        # of truth) so clippy lands on the same toolchain cargo actually uses.
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          components: clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Tests
        run: cargo test --verbose

      - name: Build Release Binary
        run: cargo build --release --verbose

  release:
    name: Publish Release
    needs: checks
    runs-on: windows-2022
    # Only tag pushes publish; this is the only job granted write access.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"          # e.g. v1.2.3 or v1.2.3-rc.1
          $version = $tag.TrimStart('v')
          $prerelease = if ($version -match '-') { 'true' } else { 'false' }
          "version=$version"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing $tag (version=$version, prerelease=$prerelease)"

      - name: Read pinned toolchain
        id: toolchain
        shell: pwsh
        run: |
          $channel = ([regex]'channel\s*=\s*"([^"]+)"').Match((Get-Content rust-toolchain.toml -Raw)).Groups[1].Value
          "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Pinned toolchain: $channel"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build Release Binary
        # build.rs stamps this into the binary + About page, so the shipped exe
        # reports exactly the tag it was built from.
        env:
          ZAPRET_UI_VERSION: ${{ steps.ver.outputs.version }}
        run: cargo build --release --verbose

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $exe = "target/release/zapret-ui.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          "$hash  zapret-ui.exe" | Out-File -FilePath "target/release/zapret-ui.exe.sha256" -Encoding ascii
          Write-Host "SHA256: $hash"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: zapret-ui ${{ github.ref_name }}
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            target/release/zapret-ui.exe
            target/release/zapret-ui.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
